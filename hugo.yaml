baseURL: "https://deepak-shakya.space/"
locale: "en-us"
title: "Deepak Shakya's Space"

module:
  imports:
    - path: "github.com/McShelby/hugo-theme-relearn"

params:
  linkTitle: ""
  themeVariant: "relearn-dark"
  logo:
    src: "/deepak-shakya.jpg"
  images:
    - "/og-deepak-shakya.jpg"
  alwaysopen: true
  collapsibleMenu: false
  disableLandingPageButton: true
  search:
    disable: false
    index:
      disable: false
    page:
      disable: true
  custom_css:
    - "css/custom.css"

security:
  exec:
    allow:
      - "^(dart-)?sass(-embedded)?$"
      - "^go$"
      - "^git$"
      - "^node$"
      - "^postcss$"
      - "^tailwindcss$"
      - "^asciidoctor$"
